<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#050607">
  <title>Catálogo Mayorista | Elite Parfums</title>
  <link rel="icon" href="assets/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Montserrat:wght@500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="catalog.css">
  <link rel="stylesheet" href="product-modal.css">
</head>
<body>
  <header class="hero">
    <img class="brand-logo" src="assets/logo.png" alt="Elite Parfums">
    <h1>Elite Parfums</h1>
    <p class="eyebrow">Catálogo exclusivo mayorista</p>
    <form id="searchForm" class="search-box">
      <input id="search" type="search" autocomplete="off" placeholder="Buscar perfume o marca..." aria-label="Buscar perfume">
      <button>Buscar</button>
    </form>

    <div id="categoryFilters" class="category-filters">
      <button class="active" data-filter="Todos">▦ Todos</button>
      <button data-filter="Hombre">♟ Hombre</button>
      <button data-filter="Mujer">♟ Mujer</button>
      <button data-filter="Arabes">◉ Árabes</button>
      <button data-filter="Unisex">♙ Unisex</button>
      <button data-filter="Estuches">▣ Estuches</button>
    </div>

    <h2 class="section-label"><span></span>Marcas destacadas<span></span></h2>
    <div id="brandFilters" class="brand-filters"></div>
  </header>

  <main>
    <section id="featuredSection">
      <h2 class="section-title"><span></span>Más buscados<span></span></h2>
      <div id="featuredGrid" class="product-grid"></div>
    </section>

    <section>
      <h2 id="resultsTitle" class="section-title"><span></span>Catálogo mayorista<span></span></h2>
      <div id="catalogGrid" class="product-grid"></div>
      <p id="emptyState" class="empty" hidden>No encontramos productos con esos filtros.</p>
      <button id="loadMore" class="load-more" hidden>Mostrar más</button>
    </section>
  </main>

  <button id="toTop" class="to-top" aria-label="Volver arriba">↑</button>

  <dialog id="productModal" class="product-modal" aria-labelledby="modalTitle">
    <div class="modal-layout">
      <button id="modalClose" class="modal-close" type="button" aria-label="Cerrar">×</button>
      <div class="modal-visual">
        <img id="modalImage" src="" alt="">
      </div>
      <div class="modal-copy">
        <span id="modalBrand" class="modal-brand"></span>
        <h2 id="modalTitle"></h2>
        <p>Producto seleccionado de Elite Parfums. Consulta disponibilidad y atención personalizada.</p>
        <a id="modalAction" class="modal-action" target="_blank" rel="noopener noreferrer">Pedir por WhatsApp</a>
      </div>
    </div>
  </dialog>

  <script src="catalog.js" defer></script>
</body>
</html>
