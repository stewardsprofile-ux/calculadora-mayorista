<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Calculadora Mayorista</title>
    <link rel="icon" type="image/png" href="imagenes/logo.png">
    <link rel="shortcut icon" type="image/png" href="imagenes/logo.png">
    <style>
        :root {
            --elite-bg: #08090C;
            --elite-surface: #0C0D12;
            --elite-gold: #D8B35C;
            --elite-gold-gradient: linear-gradient(90deg, #F6EBA6 0%, #D8B35C 52%, #A86A3E 100%);
            --elite-gold-shadow: rgba(168, 106, 62, 0.28);
            --elite-text: #FFFFFF;
            --elite-dark: #08090C;
            --elite-gold-border: rgba(216, 179, 92, 0.24);
            --elite-gold-border-strong: rgba(216, 179, 92, 0.52);
            --elite-white-border: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--elite-bg);
            margin: 0;
            color: var(--elite-text);
            padding-bottom: 50px;
            min-height: 100vh;
        }

        .encabezado-app {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 34px 20px 12px;
            background: var(--elite-bg);
        }

        .logo-app {
            width: 86px;
            height: auto;
            display: block;
            filter: drop-shadow(0 12px 24px rgba(0, 0, 0, 0.42));
        }

        .titulo-app {
            text-align: center;
            margin: 0;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #FFFFFF;
            font-weight: 800;
        }

        .controles {
            display: flex;
            justify-content: center;
            padding: 0 20px;
            margin-bottom: 30px;
        }

        #buscador {
            width: 100%;
            max-width: 450px;
            padding: 14px 25px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.95);
            color: #10171f;
            border: none;
            border-radius: 50px;
            outline: none;
            box-shadow: 0 18px 46px rgba(0, 0, 0, 0.28);
        }

        #buscador::placeholder {
            color: rgba(16, 23, 31, 0.62);
        }

        #buscador:focus {
            box-shadow: 0 0 0 2px rgba(216, 179, 92, 0.22), 0 18px 46px rgba(0, 0, 0, 0.28);
        }

        .subtitulo-seccion {
            width: 90%;
            max-width: 600px;
            margin: 10px auto 0 auto;
            font-size: 13px;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            color: #FFFFFF;
        }

        .card {
            background: rgba(8, 9, 12, 0.88);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            padding: 25px;
            margin: 20px auto;
            border-radius: 22px;
            border: 1px solid var(--elite-gold-border);
            box-shadow: 0 18px 46px rgba(0, 0, 0, 0.28);
            width: 90%;
            max-width: 600px;
        }

        .gold-main-card {
            max-width: 680px;
            position: relative;
            padding: 20px 26px 22px;
        }

        .loan-card {
            max-width: 680px;
            padding: 20px 26px 22px;
        }

        .upgrade-card {
            max-width: 680px;
            padding: 20px 26px 22px;
            position: relative;
        }

        .loan-field {
            margin-top: 6px;
        }

        .gold-panel {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--elite-gold-border);
        }

        .gold-panel[hidden] {
            display: none;
        }

        .gold-panel-toggle {
            position: absolute;
            top: 12px;
            right: 12px;
            margin: 0;
        }

        .upgrade-act {
            position: absolute;
            top: 12px;
            right: 12px;
            margin: 0;
        }

        .info h3 {
            font-size: 20px;
            margin: 0 96px 20px;
            text-transform: uppercase;
            color: #FFFFFF;
            letter-spacing: 0.09em;
            font-weight: 800;
            text-align: center;
            width: auto;
            display: block;
        }

        .gold-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        .gold-bloque {
            display: grid;
            gap: 12px;
        }

        .gold-bloque h4 {
            margin: 0;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.09em;
            color: #FFFFFF;
        }

        .campo {
            display: grid;
            gap: 8px;
        }

        .campo label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #FFFFFF;
            font-weight: 800;
        }

        .campo input,
        .campo select {
            width: 100%;
            min-width: 0;
            box-sizing: border-box;
            padding: 13px 14px;
            border-radius: 16px;
            border: 1px solid rgba(216, 179, 92, 0.30);
            background: rgba(8, 9, 12, 0.82);
            color: #FFFFFF;
            font-size: 15px;
            outline: none;
        }

        .campo input[type="date"] {
            -webkit-appearance: none;
            appearance: none;
            max-width: 100%;
        }

        .campo input:focus,
        .campo select:focus {
            border-color: rgba(216, 179, 92, 0.72);
            box-shadow: 0 0 0 2px rgba(216, 179, 92, 0.22);
        }

        .campo select option {
            color: #10171f;
        }

        .price-options {
            display: grid;
            gap: 8px;
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .price-option {
            align-items: center;
            background: rgba(8, 9, 12, 0.86);
            border: 1px solid rgba(216, 179, 92, 0.30);
            border-radius: 14px;
            color: #FFFFFF;
            cursor: pointer;
            display: inline-flex;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 0.82rem;
            font-weight: 800;
            justify-content: center;
            line-height: 1.2;
            min-height: 44px;
            padding: 9px 8px;
            transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease, transform 0.2s ease;
        }

        .price-option:hover,
        .price-option:focus-visible,
        .price-option.activo {
            background: var(--elite-gold-gradient);
            background-clip: border-box;
            border-color: var(--elite-gold);
            color: #08090C;
            transform: translateY(-1px);
        }

        .acciones {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 18px;
        }

        .btn-principal,
        .btn-secundario {
            border: 1px solid rgba(216, 179, 92, 0.38);
            border-radius: 999px;
            padding: 13px 18px;
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease, transform 0.2s ease;
        }

        .btn-principal {
            background: rgba(8, 9, 12, 0.86);
            color: #FFFFFF;
            min-width: 164px;
        }

        .btn-secundario {
            background: rgba(8, 9, 12, 0.86);
            color: #FFFFFF;
            padding: 9px 14px;
            font-size: 10px;
        }

        .btn-principal:hover,
        .btn-principal:focus-visible,
        .btn-secundario:hover,
        .btn-secundario:focus-visible {
            background: var(--elite-gold-gradient);
            background-clip: border-box;
            color: #08090C;
            border-color: var(--elite-gold);
            transform: translateY(-1px);
        }

        .estado {
            display: none;
        }

        .estado.error {
            color: var(--elite-gold);
        }

        .gold-result {
            margin-top: 24px;
        }

        .gold-resumen {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            column-gap: 14px;
            row-gap: 10px;
            margin-bottom: 12px;
            color: #FFFFFF;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0;
            font-size: 1.12rem;
            line-height: 1.25;
        }

        .gold-resumen span {
            text-align: center;
            justify-self: center;
            width: 100%;
        }

        .gold-resumen-subtitulo {
            grid-column: 1 / -1;
            text-align: center;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #FFFFFF;
            font-size: 0.82rem;
            font-weight: 400;
            letter-spacing: 0.08em;
            line-height: 1.25;
            text-transform: uppercase;
        }

        .planes {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .plan-container {
            position: relative;
            width: 100%;
            min-width: 0;
        }

        .plan-container.has-cuotas {
            display: grid;
            justify-items: center;
            row-gap: 12px;
        }

        .plan {
            display: flex;
            width: 100%;
            color: #FFFFFF;
            font-size: 13px;
            border-radius: 18px;
            overflow: hidden;
            background: linear-gradient(145deg, rgba(36, 39, 43, 0.28), rgba(8, 9, 12, 0.20));
            border: 1px solid var(--elite-gold-border-strong);
            box-shadow: 0 22px 54px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        .plan span {
            flex: 1;
            text-align: center;
            padding: 15px 5px;
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 300;
            color: #FFFFFF;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 1.12rem;
            letter-spacing: 0;
            line-height: 1.25;
        }

        .plan span:last-child {
            flex: 1.35;
            border-right: 0;
        }

        .cuotas-popover {
            position: relative;
            z-index: 12;
            justify-self: center;
        }

        .btn-cuotas {
            border: 1px solid rgba(216, 179, 92, 0.38);
            border-radius: 999px;
            background: rgba(8, 9, 12, 0.86);
            color: #FFFFFF;
            cursor: pointer;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.08em;
            padding: 8px 14px;
            text-transform: uppercase;
            transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease, transform 0.2s ease;
        }

        .btn-cuotas:hover,
        .btn-cuotas:focus-visible,
        .cuotas-popover:hover .btn-cuotas,
        .cuotas-popover:focus-within .btn-cuotas {
            background: var(--elite-gold-gradient);
            background-clip: border-box;
            border-color: var(--elite-gold);
            color: #08090C;
            transform: translateY(-1px);
        }

        .cuotas-card {
            position: absolute;
            left: 50%;
            bottom: calc(100% + 8px);
            min-width: 150px;
            display: grid;
            gap: 8px;
            padding: 12px 14px;
            border: 1px solid rgba(216, 179, 92, 0.30);
            border-radius: 16px;
            background: rgba(8, 9, 12, 0.92);
            box-shadow: 0 18px 46px rgba(0, 0, 0, 0.28);
            opacity: 0;
            pointer-events: none;
            transform: translate(-50%, 6px);
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .cuotas-popover:hover .cuotas-card,
        .cuotas-popover:focus-within .cuotas-card {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, 0);
        }

        .cuotas-card span {
            color: #FFFFFF;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 0.9rem;
            font-weight: 300;
            letter-spacing: 0;
            line-height: 1.25;
            text-align: left;
            white-space: nowrap;
        }

        .naranja,
        .rojo {
            background: linear-gradient(145deg, rgba(36, 39, 43, 0.28), rgba(8, 9, 12, 0.20));
        }

        .contado {
            background: linear-gradient(145deg, rgba(36, 39, 43, 0.28), rgba(8, 9, 12, 0.20));
            color: var(--elite-gold);
            border: 1px solid var(--elite-gold-border-strong);
            font-family: 'Segoe UI', Arial, sans-serif;
            font-weight: 500;
            text-align: center;
            padding: 18px;
            border-radius: 18px;
            font-size: 1.12rem;
            letter-spacing: 0;
            line-height: 1.25;
            box-shadow: 0 22px 54px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        .plan:hover,
        .contado:hover {
            border-color: var(--elite-gold);
            background: linear-gradient(145deg, rgba(48, 52, 56, 0.34), rgba(8, 9, 12, 0.26));
        }

        .badge {
            position: absolute;
            background: var(--elite-gold-gradient);
            color: #08090C;
            font-weight: 800;
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 10px;
            z-index: 10;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.28);
        }

        .badge-left { top: -12px; left: 0; transform: rotate(-3deg); }
        .badge-right { top: -12px; right: 0; transform: rotate(3deg); }
        .badge-tight { top: -5px; right: 0; }
        .badge-white {
            background: #FFFFFF;
            color: #08090C;
        }

        .badge-best {
            border: 1px solid transparent;
            background-image:
                linear-gradient(145deg, rgba(36, 39, 43, 0.96), rgba(8, 9, 12, 0.96)),
                var(--elite-gold-gradient);
            background-origin: border-box;
            background-clip: padding-box, border-box;
            color: rgba(255, 255, 255, 0.96);
            box-shadow:
                0 8px 22px rgba(0, 0, 0, 0.30),
                inset 0 1px 0 rgba(255, 255, 255, 0.09);
            backdrop-filter: blur(12px) saturate(115%);
            -webkit-backdrop-filter: blur(12px) saturate(115%);
        }

        .resultado-acciones {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 25px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .nota-cuotas {
            display: none;
        }

        .perfume-lista {
            width: 90%;
            max-width: 680px;
            margin: 20px auto;
            display: grid;
            gap: 10px;
        }

        .perfume-opcion {
            width: 100%;
            align-items: center;
            border: 1px solid rgba(216, 179, 92, 0.30);
            border-radius: 18px;
            background: rgba(8, 9, 12, 0.88);
            color: #FFFFFF;
            display: flex;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 0.98rem;
            font-weight: 700;
            gap: 18px;
            justify-content: space-between;
            letter-spacing: 0.04em;
            line-height: 1.25;
            padding: 15px 18px;
            text-align: left;
            text-transform: uppercase;
            box-shadow: 0 18px 46px rgba(0, 0, 0, 0.22);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease, transform 0.2s ease;
        }

        .perfume-nombre {
            min-width: 0;
        }

        .perfume-precio {
            color: var(--elite-gold);
            flex: 0 0 auto;
            font-size: 1rem;
            white-space: nowrap;
        }

        .perfume-opcion:hover {
            border-color: var(--elite-gold);
            transform: translateY(-1px);
        }

        .perfume-cotizacion .info h3 {
            margin: 0 42px 24px;
            font-size: 1.2rem;
            line-height: 1.35;
        }

        .perfume-cotizacion .resultado-acciones {
            justify-content: flex-start;
        }

        .modal-logo {
            display: block;
            filter: drop-shadow(0 10px 18px rgba(0, 0, 0, 0.34));
            height: auto;
            margin: 0 auto 12px;
            width: 46px;
        }

        .loan-cotizacion .info h3 {
            margin: 0 42px 24px;
        }

        .loan-resumen {
            display: grid;
            gap: 18px;
        }

        .loan-monto {
            color: #FFFFFF;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 1.08rem;
            font-weight: 500;
            line-height: 1.25;
            text-align: center;
            text-transform: uppercase;
        }

        .loan-plan {
            background: linear-gradient(145deg, rgba(36, 39, 43, 0.28), rgba(8, 9, 12, 0.20));
            border: 1px solid var(--elite-gold-border-strong);
            border-radius: 18px;
            box-shadow: 0 22px 54px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.08);
            display: grid;
            gap: 12px;
            padding: 18px;
            position: relative;
        }

        .loan-plan-indefinido {
            padding-top: 18px;
        }

        .loan-plan-header {
            align-items: center;
            display: grid;
            gap: 12px;
            grid-template-columns: 1fr auto 1fr;
        }

        .loan-plan-header h4 {
            grid-column: 2;
        }

        .loan-plan h4 {
            color: var(--elite-gold);
            font-size: 0.9rem;
            letter-spacing: 0.08em;
            line-height: 1.25;
            margin: 0;
            text-align: center;
            text-transform: uppercase;
        }

        .loan-line {
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            color: #FFFFFF;
            display: flex;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 1rem;
            font-weight: 300;
            gap: 12px;
            justify-content: space-between;
            line-height: 1.25;
            padding-top: 12px;
        }

        .loan-line strong {
            color: #FFFFFF;
            font-weight: 600;
            text-align: right;
        }

        .loan-line[hidden] {
            display: none;
        }

        .loan-pill {
            align-items: center;
            background: rgba(8, 9, 12, 0.86);
            border: 1px solid rgba(216, 179, 92, 0.38);
            border-radius: 999px;
            color: #FFFFFF;
            cursor: pointer;
            display: inline-flex;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 0.72rem;
            font-weight: 800;
            justify-content: center;
            letter-spacing: 0.08em;
            padding: 8px 12px;
            text-transform: uppercase;
            transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease, transform 0.2s ease;
        }

        .loan-pill:hover,
        .loan-pill:focus-visible,
        .loan-pill.activo {
            background: var(--elite-gold-gradient);
            border-color: var(--elite-gold);
            color: #08090C;
            transform: translateY(-1px);
        }

        .loan-plan-indefinido > .loan-pill {
            display: none;
        }

        .loan-plan-header .loan-pill {
            grid-column: 3;
            justify-self: end;
        }

        .upgrade-cotizacion {
            display: grid;
            gap: 18px;
        }

        .upgrade-hero {
            display: grid;
            gap: 8px;
            justify-items: center;
            text-align: center;
        }

        .upgrade-frase {
            color: #FFFFFF;
            font-size: clamp(0.92rem, 2.15vw, 1.18rem);
            font-weight: 800;
            line-height: 1.22;
            margin: 0;
            text-transform: uppercase;
        }

        .upgrade-main-value {
            background: var(--elite-bg);
            border: 1px solid var(--elite-gold-border-strong);
            border-radius: 18px;
            box-shadow: 0 22px 54px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.08);
            display: grid;
            gap: 6px;
            padding: 18px;
            text-align: center;
        }

        .upgrade-main-value span {
            color: rgba(255, 255, 255, 0.78);
            font-size: 0.78rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .upgrade-main-value strong {
            color: var(--elite-gold);
            font-size: clamp(2rem, 8vw, 3.3rem);
            font-weight: 900;
            letter-spacing: 0;
            line-height: 1;
        }

        .upgrade-metrics {
            display: grid;
            gap: 12px;
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .upgrade-metric {
            background: linear-gradient(145deg, rgba(36, 39, 43, 0.28), rgba(8, 9, 12, 0.20));
            border: 1px solid rgba(216, 179, 92, 0.30);
            border-radius: 16px;
            display: grid;
            gap: 7px;
            padding: 14px 10px;
            text-align: center;
        }

        .upgrade-metric span {
            color: rgba(255, 255, 255, 0.68);
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            line-height: 1.2;
            text-transform: uppercase;
        }

        .upgrade-metric strong {
            color: #FFFFFF;
            font-size: 1.02rem;
            font-weight: 700;
            line-height: 1.2;
        }

        .upgrade-close {
            color: rgba(255, 255, 255, 0.82);
            font-size: 0.96rem;
            font-weight: 600;
            line-height: 1.35;
            margin: 0;
            text-align: center;
        }

        .upgrade-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: -4px;
        }

        .upgrade-quote-button {
            background: rgba(8, 9, 12, 0.86);
            border: 1px solid rgba(216, 179, 92, 0.38);
            border-radius: 999px;
            color: #FFFFFF;
            cursor: pointer;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 0.72rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            padding: 9px 13px;
            text-transform: uppercase;
            transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease, transform 0.2s ease;
        }

        .upgrade-quote-button:hover,
        .upgrade-quote-button:focus-visible,
        .upgrade-quote-button.activo {
            background: var(--elite-gold-gradient);
            border-color: var(--elite-gold);
            color: #08090C;
            transform: translateY(-1px);
        }

        .upgrade-internal-quote {
            background: linear-gradient(145deg, rgba(36, 39, 43, 0.28), rgba(8, 9, 12, 0.20));
            border: 1px solid rgba(216, 179, 92, 0.42);
            border-radius: 18px;
            box-shadow: 0 22px 54px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.08);
            display: grid;
            gap: 12px;
            padding: 18px;
        }

        .upgrade-internal-quote[hidden] {
            display: none;
        }

        .upgrade-internal-quote h4 {
            color: var(--elite-gold);
            font-size: 0.9rem;
            letter-spacing: 0.08em;
            line-height: 1.25;
            margin: 0;
            text-align: center;
            text-transform: uppercase;
        }

        .upgrade-total-line strong {
            color: var(--elite-gold);
        }

        .upgrade-payment-quote {
            display: grid;
            gap: 12px;
            padding-top: 2px;
        }

        .upgrade-payment-heading {
            margin-bottom: 0;
        }

        .upgrade-payment-plan span {
            flex: 1;
        }

        .upgrade-payment-plan span:last-child {
            flex: 1;
        }

        .btn-prima {
            background: rgba(8, 9, 12, 0.86);
            color: #FFFFFF;
            border: 1px solid rgba(216, 179, 92, 0.38);
            padding: 12px 25px;
            border-radius: 999px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.08em;
            transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease, transform 0.2s ease;
        }

        .btn-prima:hover,
        .btn-prima.activo {
            border-color: var(--elite-gold);
            color: #08090C;
            background: var(--elite-gold-gradient);
            transform: translateY(-1px);
        }

        .gold-modal {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: rgba(3, 4, 7, 0.72);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.22s ease;
        }

        .gold-modal.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .gold-modal-dialog {
            width: min(100%, 760px);
            max-height: calc(100vh - 40px);
            overflow-x: hidden;
            overflow-y: auto;
            background: rgba(8, 9, 12, 0.92);
            border: 1px solid rgba(216, 179, 92, 0.30);
            border-radius: 30px;
            box-shadow: 0 24px 62px rgba(0, 0, 0, 0.34);
            padding: 26px 22px 22px;
            position: relative;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }

        .gold-modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 34px;
            height: 34px;
            border: 1px solid var(--elite-gold-border-strong);
            border-radius: 50%;
            background: rgba(8, 9, 12, 0.86);
            color: #FFFFFF;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.28);
        }

        .gold-modal-close:hover {
            background: var(--elite-gold-gradient);
            color: #08090C;
        }

        .gold-modal-body {
            margin-top: 10px;
            overflow: visible;
        }

        .gold-modal-note {
            display: none;
        }

        .card,
        .campo input,
        .campo select,
        .price-option,
        .btn-principal,
        .btn-secundario,
        .plan,
        .contado,
        .btn-cuotas,
        .cuotas-card,
        .perfume-opcion,
        .loan-plan,
        .loan-pill,
        .upgrade-metric,
        .upgrade-quote-button,
        .upgrade-internal-quote,
        .btn-prima,
        .gold-modal-dialog,
        .gold-modal-close {
            border-color: transparent;
            background-image:
                linear-gradient(var(--elite-bg), var(--elite-bg)),
                var(--elite-gold-gradient);
            background-origin: border-box;
            background-clip: padding-box, border-box;
        }

        .upgrade-main-value {
            border-color: transparent;
            background-image:
                linear-gradient(var(--elite-bg), var(--elite-bg)),
                var(--elite-gold-gradient);
            background-origin: border-box;
            background-clip: padding-box, border-box;
        }

        /* Estado interactivo comun: tambien cubre botones insertados por JavaScript. */
        button:is(
            :hover,
            :active,
            :focus-visible,
            .activo,
            [aria-pressed="true"],
            [aria-selected="true"],
            [data-selected="true"]
        ),
        .cuotas-popover:is(:hover, :focus-within) > button.btn-cuotas {
            background: linear-gradient(
                145deg,
                rgba(255, 255, 255, 0.075) 0%,
                rgba(29, 27, 24, 0.64) 48%,
                rgba(216, 179, 92, 0.055) 100%
            ) !important;
            background-clip: padding-box !important;
            border-color: rgba(216, 179, 92, 0.34) !important;
            box-shadow:
                0 8px 22px rgba(0, 0, 0, 0.24),
                inset 0 1px 0 rgba(255, 255, 255, 0.09) !important;
            color: rgba(255, 255, 255, 0.96) !important;
            backdrop-filter: blur(12px) saturate(115%);
            -webkit-backdrop-filter: blur(12px) saturate(115%);
            transform: none !important;
        }

        @media (max-width:600px) {
            .gold-grid { grid-template-columns: 1fr; }
            .gold-resumen {
                grid-template-columns: 1fr;
            }
            .encabezado-app {
                padding-top: 28px;
                gap: 10px;
            }
            .logo-app {
                width: 72px;
            }
            .acciones > button {
                width: 100%;
            }
            .gold-main-card {
                padding: 56px 15px 18px;
            }
            .loan-card {
                padding: 18px 15px;
                overflow: hidden;
            }
            .upgrade-card {
                padding: 56px 15px 18px;
            }
            .gold-panel-toggle {
                top: 16px;
                right: 16px;
            }
            .upgrade-act {
                top: 16px;
                right: 16px;
            }
            .gold-panel-toggle .btn-secundario {
                font-size: 0;
                min-width: 46px;
                padding: 8px 9px;
            }
            .gold-panel-toggle .btn-secundario::after,
            .upgrade-act .btn-secundario::after {
                content: "Act.";
                font-size: 10px;
                letter-spacing: 0.08em;
            }
            .upgrade-act .btn-secundario {
                font-size: 0;
                min-width: 46px;
                padding: 8px 9px;
            }
            .price-options {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
            .info h3 {
                margin: 0 0 20px;
                font-size: 18px;
            }
            .plan {
                flex-direction: row;
                width: 100%;
            }
            .plan span {
                min-width: 0;
                box-sizing: border-box;
                border-right: 1px solid rgba(255, 255, 255, 0.08);
                border-bottom: 0;
                font-size: clamp(0.74rem, 3.15vw, 0.92rem);
                padding: 13px 2px;
                overflow-wrap: anywhere;
                white-space: normal;
            }
            .plan span:last-child {
                border-right: 0;
            }
            .cuotas-popover {
                position: relative;
                margin-top: 0;
            }
            .card { padding: 15px; }
            .info h3 { font-size: 16px; }
            .gold-modal {
                align-items: center;
                padding: 18px 14px;
            }
            .gold-modal-dialog {
                width: min(92vw, 520px);
                max-height: calc(100dvh - 36px);
                border-radius: 28px;
                margin-top: 0;
                padding: 28px 16px 22px;
                overflow-x: hidden;
                overflow-y: auto;
            }
            .gold-modal-close {
                top: 18px;
                right: 18px;
                width: 32px;
                height: 32px;
            }
            .gold-modal-body {
                margin-top: 24px;
                width: 100%;
            }
            .modal-logo {
                width: 40px;
            }
            .gold-modal-note {
                text-align: center;
            }
            .resultado-acciones {
                justify-content: center;
            }
            .perfume-cotizacion .info h3 {
                margin: 0 36px 22px;
                font-size: clamp(0.88rem, 4vw, 1rem);
            }
            .perfume-cotizacion .resultado-acciones {
                justify-content: center;
            }
            .loan-cotizacion .info h3 {
                margin: 0 36px 22px;
                font-size: clamp(0.88rem, 4vw, 1rem);
            }
            .loan-line {
                align-items: center;
                flex-direction: row;
                font-size: 0.94rem;
                gap: 10px;
                justify-content: space-between;
            }
            .loan-line strong {
                flex: 0 0 auto;
                margin-left: auto;
                text-align: right;
                white-space: nowrap;
            }
            .loan-line span {
                min-width: 0;
                text-align: left;
            }
            .loan-plan-header {
                grid-template-columns: 1fr;
            }
            .loan-plan-header h4,
            .loan-plan-header .loan-pill {
                grid-column: 1;
                justify-self: center;
            }
            .upgrade-metrics {
                grid-template-columns: 1fr;
            }
            .perfume-cotizacion,
            .perfume-cotizacion .planes,
            .plan-container,
            .contado {
                width: 100%;
            }
            .contado {
                font-size: clamp(0.86rem, 3.7vw, 1rem);
                padding: 16px 8px;
            }
            .badge {
                font-size: 8px;
                padding: 5px 8px;
                letter-spacing: 0.06em;
            }
            .btn-cuotas {
                font-size: 10px;
                padding: 7px 13px;
            }
            .btn-prima {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="encabezado-app">
    <img class="logo-app" src="imagenes/logo.png" alt="Logo">
    <h1 class="titulo-app">Calculadora Mayorista</h1>
</div>
<div class="controles">
    <input id="buscador" type="search" placeholder="Buscar perfume...">
</div>

<section class="card gold-main-card" id="gold-card" hidden>
    <div class="info">
        <h3>Cotizacion Oro</h3>
    </div>

    <div class="gold-grid">
        <div class="campo">
            <label for="gold-peso">Peso en gramos</label>
            <input id="gold-peso" type="number" min="0" step="0.01" placeholder="7">
        </div>
        <div class="campo">
            <label for="gold-tipo">Tipo de oro</label>
            <select id="gold-tipo">
                <option value="nacional">Nacional</option>
                <option value="italiano">Italiano</option>
            </select>
        </div>
    </div>

    <div class="acciones">
        <button id="cotizar-oro" class="btn-principal" type="button">Cotizar Pieza</button>
    </div>

    <div class="gold-panel-toggle">
        <button id="toggle-gold-settings" class="btn-secundario" type="button">Actualizar</button>
    </div>

    <div id="gold-status" class="estado"></div>
    <div id="gold-resultado" class="gold-result" hidden></div>

    <div id="gold-settings-panel" class="gold-panel" hidden>
        <div class="info">
            <h3>Datos del Oro</h3>
        </div>

        <div class="gold-grid">
            <div class="gold-bloque">
                <h4>Oro Nacional</h4>
                <div class="campo">
                    <label for="precio-contado-nacional">Precio venta contado por gramo</label>
                    <input id="precio-contado-nacional" type="text" inputmode="numeric" placeholder="₡50.000">
                </div>
                <div class="campo">
                    <label for="precio-pagos-nacional">Precio venta a pagos por gramo</label>
                    <input id="precio-pagos-nacional" type="text" inputmode="numeric" placeholder="₡70.000">
                </div>
                <div class="campo">
                    <label for="costo-nacional">Costo nacional por gramo</label>
                    <input id="costo-nacional" type="text" inputmode="numeric" placeholder="₡36.000">
                </div>
                <div class="campo">
                    <label for="costo-fundicion">Costo fundicion por gramo</label>
                    <input id="costo-fundicion" type="text" inputmode="numeric" placeholder="₡7.500">
                </div>
            </div>

            <div class="gold-bloque">
                <h4>Oro Italiano</h4>
                <div class="campo">
                    <label for="precio-contado-italiano">Precio venta contado por gramo</label>
                    <input id="precio-contado-italiano" type="text" inputmode="numeric" placeholder="₡50.000">
                </div>
                <div class="campo">
                    <label for="precio-pagos-italiano">Precio venta a pagos por gramo</label>
                    <input id="precio-pagos-italiano" type="text" inputmode="numeric" placeholder="₡70.000">
                </div>
                <div class="campo">
                    <label for="costo-italiano">Costo italiano por gramo</label>
                    <input id="costo-italiano" type="text" inputmode="numeric" placeholder="₡44.000">
                </div>
            </div>
        </div>

        <div class="acciones">
            <button id="guardar-oro" class="btn-principal" type="button">Guardar Datos</button>
            <button id="recargar-oro" class="btn-secundario" type="button">Recargar Datos</button>
        </div>
    </div>
</section>

<section class="card loan-card" id="loan-card" hidden>
    <div class="info">
        <h3>Prestamos</h3>
    </div>

    <div class="campo loan-field">
        <label for="loan-monto">Monto del prestamo</label>
        <input id="loan-monto" type="text" inputmode="numeric" placeholder="Monto solicitado">
    </div>

    <div class="campo loan-field">
        <label for="loan-fecha">Fecha del prestamo</label>
        <input id="loan-fecha" type="date">
    </div>

    <div class="acciones">
        <button id="calcular-prestamo" class="btn-principal" type="button">Calcular</button>
    </div>

    <div id="loan-status" class="estado"></div>
</section>

<section class="card upgrade-card" id="upgrade-card" hidden>
    <div class="info">
        <h3>Subir de Nivel</h3>
    </div>

    <div class="upgrade-act">
        <button id="toggle-upgrade-settings" class="btn-secundario" type="button">Act.</button>
    </div>

    <div class="gold-grid">
        <div class="campo">
            <label for="upgrade-gramos">Gramos que entrega el cliente</label>
            <input id="upgrade-gramos" type="number" min="0" step="0.01" placeholder="4.40">
        </div>

        <div class="campo">
            <label for="upgrade-precio-compra">Precio de la pieza</label>
            <input id="upgrade-precio-compra" type="text" inputmode="numeric" placeholder="₡100.000">
        </div>
    </div>

    <div class="acciones">
        <button id="calcular-upgrade" class="btn-principal" type="button">Calcular Prima</button>
    </div>

    <div id="upgrade-status" class="estado"></div>
</section>

<section class="card upgrade-card" id="renewal-card" hidden>
    <div class="info">
        <h3>Renovacion ELITE</h3>
    </div>

    <div class="upgrade-act">
        <button id="toggle-renewal-settings" class="btn-secundario" type="button">Datos</button>
    </div>

    <div class="campo loan-field">
        <label for="renewal-peso">Peso de la pieza a cotizar</label>
        <input id="renewal-peso" type="number" min="0" step="0.01" placeholder="10">
    </div>

    <div class="acciones">
        <button id="cotizar-renovacion" class="btn-principal" type="button">Cotizar</button>
    </div>

    <div id="renewal-status" class="estado"></div>

    <div id="renewal-settings-panel" class="gold-panel" hidden>
        <div class="gold-grid">
            <div class="campo">
                <label for="renewal-costo-fundir">Mi costo por fundir</label>
                <input id="renewal-costo-fundir" type="text" inputmode="numeric" placeholder="₡7.500">
            </div>

            <div class="campo">
                <label for="renewal-precio-financiado">Precio financiado por fundir</label>
                <input id="renewal-precio-financiado" type="text" inputmode="numeric" placeholder="₡12.000">
            </div>

            <div class="campo">
                <label for="renewal-precio-contado">Precio de contado por fundir</label>
                <input id="renewal-precio-contado" type="text" inputmode="numeric" placeholder="₡10.000">
            </div>
        </div>

        <div class="acciones">
            <button id="guardar-renovacion" class="btn-principal" type="button">Guardar Datos</button>
        </div>
    </div>
</section>

<div id="resultados"></div>

<div id="gold-modal" class="gold-modal" aria-hidden="true">
    <div class="gold-modal-dialog" role="dialog" aria-modal="true" aria-label="Detalle de cotizacion">
        <button id="gold-modal-close" class="gold-modal-close" type="button" aria-label="Cerrar cotizacion">X</button>
        <div id="gold-modal-body" class="gold-modal-body"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>
</body>
</html>
